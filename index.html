<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Ciudadano - CAR San Miguel</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">

</head>
<body>

<div class="container py-5">
    <div class="text-center mb-4">
        <h1 class="fw-bold">Reporte Ciudadano</h1>
        <p class="text-muted">Su opinión es importante para mejorar nuestro servicio</p>
    </div>

    <div class="card glass-card shadow-lg p-4">
        <form id="reportForm">

            <div class="mb-3">
                <label class="form-label fw-semibold">Tipo de Reporte</label>
                <select class="form-select" id="tipo" required>
                    <option value="">Seleccione una opción</option>
                    <option value="Observación">Observación</option>
                    <option value="Sugerencia">Sugerencia</option>
                    <option value="Problema">Problema</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Descripción</label>
                <textarea class="form-control" id="descripcion" rows="4" placeholder="Explique su situación con claridad..." required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Ubicación</label>
                <input type="text" class="form-control" id="ubicacion" placeholder="Ej: Entrada principal">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre (opcional)</label>
                <input type="text" class="form-control" id="nombre">
            </div>

            <button class="btn btn-primary w-100 fw-bold">Enviar Reporte</button>

        </form>

        <div id="mensaje" class="mt-3 text-success fw-semibold text-center"></div>
    </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
